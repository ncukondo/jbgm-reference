name: Release Agent Skills ZIP

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - run: uv run export_chatgpt_skill.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/jbgm-reference.zip
          generate_release_notes: true
